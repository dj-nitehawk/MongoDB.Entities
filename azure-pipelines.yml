trigger:
  tags:
    include:
      - "v*"
  branches:
    exclude:
      - "*"

pool:
  vmImage: "ubuntu-latest"

variables:
  buildConfiguration: "Release"

resources:
  containers:
    - container: mongodb
      image: mongo:8.0
      ports:
        - 27017:27017
      env:
        MONGO_INITDB_ROOT_USERNAME: admin
        MONGO_INITDB_ROOT_PASSWORD: password
      command: ["--replSet", "rs0", "--bind_ip_all"]

services:
  mongodb: mongodb

steps:
  - script: |
      set -e

      CONTAINER_ID=$(docker ps --filter "name=mongodb" --format "{{.ID}}" | head -1)
      if [ -z "$CONTAINER_ID" ]; then
        echo "MongoDB service container not found"
        exit 1
      fi

      docker exec "$CONTAINER_ID" mongosh \
        -u admin \
        -p password \
        --authenticationDatabase admin \
        --quiet \
        --eval "try { rs.status(); } catch (e) { rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'localhost:27017'}]}); }"

      docker exec "$CONTAINER_ID" mongosh \
        -u admin \
        -p password \
        --authenticationDatabase admin \
        --quiet \
        --eval "while (!db.hello().isWritablePrimary) { sleep(1000); }"
    displayName: "Initialize ReplicaSet"

  - task: UseDotNet@2
    displayName: "Use .Net SDK"
    inputs:
      packageType: "sdk"
      version: "10.x"

  - task: DotNetCoreCLI@2
    displayName: "Run Tests"
    inputs:
      command: "test"
      projects: "**/*[Tt]ests/*.csproj"
      arguments: "--configuration $(buildConfiguration)"
      workingDirectory: "Tests"
