trigger:
  tags:
    include:
      - "v*"
  branches:
    exclude:
      - "*"

pool:
  vmImage: "ubuntu-latest"

variables:
  buildConfiguration: "Release"

resources:
  containers:
    - container: mongodb
      image: mongo:8.0
      ports:
        - 27017:27017

services:
  mongodb: mongodb

steps:
  - script: |
      set -e

      docker ps -a

      docker rm -f mongodb-test >/dev/null 2>&1 || true
      docker run -d \
        --name mongodb-test \
        --hostname localhost \
        -p 27017:27017 \
        -e MONGO_INITDB_ROOT_USERNAME=admin \
        -e MONGO_INITDB_ROOT_PASSWORD=password \
        mongo:8.0 \
        --replSet rs0 --bind_ip_all

      CONTAINER_ID=mongodb-test

      for i in $(seq 1 30); do
        if docker exec "$CONTAINER_ID" mongosh \
          -u admin \
          -p password \
          --authenticationDatabase admin \
          --quiet \
          --eval "db.runCommand({ ping: 1 }).ok" >/dev/null 2>&1; then
          break
        fi
        sleep 1
      done

      docker exec "$CONTAINER_ID" mongosh \
        -u admin \
        -p password \
        --authenticationDatabase admin \
        --quiet \
        --eval "try { rs.status(); } catch (e) { rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'localhost:27017'}]}); }"

      docker exec "$CONTAINER_ID" mongosh \
        -u admin \
        -p password \
        --authenticationDatabase admin \
        --quiet \
        --eval "while (!db.hello().isWritablePrimary) { sleep(1000); }"
    displayName: "Initialize ReplicaSet"

  - task: UseDotNet@2
    displayName: "Use .Net SDK"
    inputs:
      packageType: "sdk"
      version: "10.x"

  - task: DotNetCoreCLI@2
    displayName: "Run Tests"
    inputs:
      command: "test"
      projects: "**/*[Tt]ests/*.csproj"
      arguments: "--configuration $(buildConfiguration)"
      workingDirectory: "Tests"
